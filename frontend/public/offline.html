<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LibrasLive Edu offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8faf7;
        color: #10201c;
        font-family: Arial, sans-serif;
        padding: 24px;
      }
      main {
        max-width: 560px;
        border: 1px solid rgba(16, 32, 28, 0.14);
        border-radius: 8px;
        background: white;
        padding: 24px;
        box-shadow: 0 16px 40px rgba(16, 32, 28, 0.12);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        line-height: 1.5;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main role="status">
      <h1>LibrasLive Edu</h1>
      <p>Você está offline. Reconecte para acompanhar a aula ao vivo.</p>
      <p>Quando a conexão voltar, reabra a sala ou toque em atualizar.</p>
    </main>
  </body>
</html>
