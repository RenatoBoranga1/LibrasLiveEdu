services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: libraslive
      POSTGRES_USER: libraslive
      POSTGRES_PASSWORD: libraslive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libraslive -d libraslive"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      APP_NAME: LibrasLive Edu
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://libraslive:libraslive@postgres:5432/libraslive
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DEMO_MODE: "true"
      VLIBRAS_API_URL: ${VLIBRAS_API_URL:-}
      VLIBRAS_API_KEY: ${VLIBRAS_API_KEY:-}
      TRUSTED_DICTIONARY_SOURCES: ${TRUSTED_DICTIONARY_SOURCES:-VLibras}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
